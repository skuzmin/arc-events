server {
    listen 80;
    server_name static.yourdomain.local;

    root /var/www/static;

    location /icons/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
        
        gzip on;
        gzip_types image/svg+xml;
        
        location ~* \.(svg|png|webp|ico)$ {
            try_files $uri =404;
        }
    }

    location / {
        return 404;
    }
}